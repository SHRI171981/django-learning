<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<style>
    .crm-navbar {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
        padding: 0.65rem 0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .crm-navbar .navbar-brand {
        font-weight: 800;
        font-size: 1.15rem;
        color: #ffffff;
        letter-spacing: -0.3px;
    }
    .crm-navbar .navbar-brand span {
        background: linear-gradient(135deg, #a78bfa, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .crm-navbar .nav-link {
        color: rgba(255,255,255,0.7);
        font-size: 0.88rem;
        font-weight: 500;
        padding: 0.45rem 0.9rem;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
    }
    .crm-navbar .nav-link:hover,
    .crm-navbar .nav-link:focus {
        color: #ffffff;
        background: rgba(255,255,255,0.08);
    }
    .crm-navbar .nav-link.active {
        color: #ffffff;
        background: rgba(255,255,255,0.12);
    }
    .crm-navbar .navbar-text {
        color: rgba(255,255,255,0.6);
        font-size: 0.85rem;
    }
    .crm-navbar .navbar-text strong {
        color: #ffffff;
    }
    .crm-navbar .navbar-toggler {
        border-color: rgba(255,255,255,0.2);
    }
    .crm-navbar .navbar-toggler-icon {
        filter: invert(1);
    }
    .crm-navbar .nav-link-logout {
        color: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 0.35rem 0.85rem;
        border-radius: 6px;
    }
    .crm-navbar .nav-link-logout:hover {
        color: #ffffff;
        background: rgba(220,38,38,0.15);
        border-color: rgba(220,38,38,0.3);
    }
    .crm-navbar .nav-link-settings {
        color: rgba(255,255,255,0.65);
    }
    .crm-navbar .nav-link-settings:hover {
        color: #ffffff;
        background: rgba(255,255,255,0.08);
    }
</style>

<nav class="navbar navbar-expand-lg crm-navbar">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="/"><span>CRM</span> Platform</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        {% if request.user.is_staff %}
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'products' %}">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'customers' %}">Customers</a>
        </li>
        {% endif %}
      </ul>
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <span class="navbar-text me-2">
            {% if user.is_authenticated %}
              Hello, <strong>{{ user.username }}</strong>
            {% else %}
              Hello, <strong>Guest</strong>
            {% endif %}
          </span>
        </li>
        {% if not request.user.is_staff %}
        <li class="nav-item">
          <a class="nav-link nav-link-settings" href="{% url 'account-settings' %}">Settings</a>
        </li>
        {% endif %}
        <li class="nav-item">
          <a class="nav-link nav-link-logout" href="{% url 'logout' %}">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
